name: Update README with Blog Posts

on:
  issues:
    types: [opened, edited, deleted, labeled, unlabeled, closed, reopened]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    steps:
      - uses: actions/checkout@v4

      - name: Generate blog list
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'blog',
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 100,
            });

            let list = '';
            issues.forEach((issue, index) => {
              list += `${index + 1}. [${issue.title}](${issue.html_url})\n`;
            });

            if (list === '') {
              list = '_暂无文章_\n';
            }

            const fs = require('fs');
            const readme = fs.readFileSync('README.md', 'utf8');
            const updated = readme.replace(
              /<!-- BLOG-LIST:START -->[\s\S]*?<!-- BLOG-LIST:END -->/,
              `<!-- BLOG-LIST:START -->\n${list}<!-- BLOG-LIST:END -->`
            );
            fs.writeFileSync('README.md', updated);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "docs: update blog list" && git push)
